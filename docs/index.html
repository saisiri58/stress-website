<!DOCTYPE html>
<html>
<head>
<title>Student Stress Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right,#74ebd5,#ACB6E5);
    text-align:center;
}

nav {
    background:#2c3e50;
    padding:15px;
}
nav a {
    color:white;
    margin:10px;
    text-decoration:none;
    font-weight:bold;
}

header {
    color:white;
    padding:40px;
    font-size:28px;
}

.card {
    background:white;
    margin:20px auto;
    padding:20px;
    width:85%;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

button {
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#2ecc71;
    color:white;
    cursor:pointer;
}

input, textarea {
    width:80%;
    padding:10px;
    margin:8px;
    border-radius:8px;
    border:1px solid #ccc;
}

canvas {
    border:2px solid black;
}

footer {
    background:#2c3e50;
    color:white;
    padding:10px;
}
</style>
</head>

<body>

<nav>
<a href="#tips">Tips</a>
<a href="#relax">Relax</a>
<a href="#draw">Draw</a>
<a href="#contact">Contact</a>
</nav>

<header>
🌿 Student Stress Management
</header>

<div class="card" id="tips">
<h2>📘 Stress Management Tips</h2>
<p>✔ Take breaks</p>
<p>✔ Stay organized</p>
<p>✔ Exercise regularly</p>
</div>

<div class="card" id="relax">
<h2>🧘 Relax Zone</h2>
<button onclick="playMusic(1)">Sound 1</button>
<button onclick="playMusic(2)">Sound 2</button>
<button onclick="stopMusic()">Stop</button>

<audio id="m1" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
<audio id="m2" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
</div>

<div class="card" id="draw">
<h2>🎨 Drawing Board</h2>

<input type="color" id="colorPicker">
<input type="range" id="size" min="1" max="10" value="3">

<br><br>

<canvas id="canvas" width="300" height="300"></canvas><br><br>
<button onclick="clearCanvas()">Clear</button>
</div>

<div class="card" id="contact">
<h2>📩 Contact</h2>
<input id="name" placeholder="Your Name"><br>
<textarea id="msg" placeholder="Your Message"></textarea><br>
<button onclick="sendMail()">Send</button>
</div>

<footer>
Made with ❤️ by Srilatha
</footer>

<script>
// 🎵 Music
function playMusic(n){
    stopMusic();
    document.getElementById("m"+n).play();
}
function stopMusic(){
    document.getElementById("m1").pause();
    document.getElementById("m2").pause();
}

// 🎨 Drawing (FIXED)
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing = false;

canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("mouseup", stopDraw);
canvas.addEventListener("mousemove", draw);

function startDraw(e){
    drawing = true;
    ctx.beginPath();
    ctx.moveTo(e.offsetX, e.offsetY);
}

function stopDraw(){
    drawing = false;
}

function draw(e){
    if(!drawing) return;

    ctx.strokeStyle = document.getElementById("colorPicker").value;
    ctx.lineWidth = document.getElementById("size").value;
    ctx.lineCap = "round";

    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();
}

function clearCanvas(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
}

// 📩 Contact
function sendMail(){
    let name=document.getElementById("name").value;
    let msg=document.getElementById("msg").value;
    window.location.href = `mailto:?subject=Message from ${name}&body=${msg}`;
}
</script>

</body>
</html>
