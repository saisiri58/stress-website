<!DOCTYPE html>
<html>
<head>
    <title>Student Stress Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
        }

        nav {
            background: #2c3e50;
            padding: 15px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        nav a:hover {
            color: #1abc9c;
        }

        header {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 30px;
            animation: fadeIn 2s;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        .card {
            background: white;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            width: 80%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.3s;
            animation: slideUp 1s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #2ecc71;
            color: white;
            cursor: pointer;
        }

        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
        }

        /* Animations */
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideUp {
            from {transform: translateY(50px); opacity: 0;}
            to {transform: translateY(0); opacity: 1;}
        }
    </style>
</head>
<body>

<nav>
    <a href="#">Home</a>
    <a href="#tips">Tips</a>
    <a href="#relax">Relax</a>
</nav>

<header>
    🌿 Student Stress Management
</header>

<div class="container">

    <div id="tips" class="card">
        <h2>📘 Stress Relief Tips</h2>
        <p>✔ Take breaks</p>
        <p>✔ Stay organized</p>
        <p>✔ Exercise</p>
    </div>

    <div id="relax" class="card">
        <h2>🧘 Relax Zone</h2>
        <button onclick="playMusic()">Play Music 🎵</button>
        <audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    </div>

</div>

<footer>
    Made with ❤️ by Srilatha
</footer>

<script>
function playMusic() {
    document.getElementById("music").play();
}
</script>

</body>
</html>
