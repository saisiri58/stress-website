<!DOCTYPE html>
<html>
<head>
    <title>Student Stress Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            text-align: center;
        }

        nav {
            background: #2c3e50;
            padding: 15px;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        header {
            color: white;
            padding: 30px;
            font-size: 28px;
            animation: fadeIn 2s;
        }

        .card {
            background: white;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            width: 80%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            animation: slideUp 1s;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #2ecc71;
            color: white;
            cursor: pointer;
        }

        canvas {
            border: 2px solid black;
        }

        footer {
            background: #2c3e50;
            color: white;
            padding: 10px;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideUp {
            from {transform: translateY(50px); opacity: 0;}
            to {transform: translateY(0); opacity: 1;}
        }
    </style>
</head>
<body>

<nav>
    <a href="#">Home</a>
    <a href="#tips">Tips</a>
    <a href="#relax">Relax</a>
</nav>

<header>
    🌿 Student Stress Management
</header>

<div class="card" id="tips">
    <h2>📘 Tips</h2>
    <p>✔ Take breaks</p>
    <p>✔ Stay organized</p>
    <p>✔ Exercise regularly</p>
</div>

<div class="card" id="relax">
    <h2>🧘 Relax</h2>
    <button onclick="playMusic()">Play Music 🎵</button>
    <audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
</div>

<div class="card">
    <h2>🎨 Draw & Relax</h2>
    <canvas id="draw" width="300" height="300"></canvas><br><br>
    <button onclick="clearCanvas()">Clear</button>
</div>

<div class="card">
    <h2>🎮 Mini Game</h2>
    <p>Score: <span id="score">0</span></p>
    <button onclick="increaseScore()">Click Me!</button>
</div>

<footer>
    Made with ❤️ by Srilatha
</footer>

<script>
function playMusic() {
    document.getElementById("music").play();
}

// Drawing
const canvas = document.getElementById("draw");
const ctx = canvas.getContext("2d");
let drawing = false;

canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mousemove", draw);

function draw(e) {
    if (!drawing) return;
    ctx.fillRect(e.offsetX, e.offsetY, 2, 2);
}

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// Game
let score = 0;
function increaseScore() {
    score++;
    document.getElementById("score").innerText = score;
}
</script>

</body>
</html>
