<!DOCTYPE html>
<html>
<head>
<title>Student Stress Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right,#74ebd5,#ACB6E5);
    text-align:center;
}

nav {
    background:#2c3e50;
    padding:15px;
}
nav a {
    color:white;
    margin:10px;
    text-decoration:none;
    font-weight:bold;
}

header {
    color:white;
    padding:40px;
    font-size:28px;
}

.card {
    background:white;
    margin:20px auto;
    padding:20px;
    width:85%;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

button {
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#2ecc71;
    color:white;
    cursor:pointer;
}

canvas {
    border:2px solid black;
    touch-action: none;
}

footer {
    background:#2c3e50;
    color:white;
    padding:10px;
}
</style>
</head>

<body>

<nav>
<a href="#tips">Tips</a>
<a href="#draw">Draw</a>
</nav>

<header>
🌿 Student Stress Management
</header>

<div class="card" id="tips">
<h2>Stress Tips</h2>
<p>✔ Take breaks</p>
<p>✔ Stay positive</p>
</div>

<div class="card" id="draw">
<h2>🎨 Drawing Board</h2>

<input type="color" id="colorPicker" value="#000000">
<input type="range" id="size" min="1" max="10" value="3">

<br><br>

<canvas id="canvas" width="300" height="300"></canvas><br><br>
<button onclick="clearCanvas()">Clear</button>
</div>

<footer>
Made with ❤️ by Srilatha
</footer>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing = false;

// Get position
function getPos(e){
    let rect = canvas.getBoundingClientRect();
    return {
        x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left,
        y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top
    };
}

// Start
function start(e){
    drawing = true;
    let pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
}

// Draw
function draw(e){
    if(!drawing) return;
    e.preventDefault();

    let pos = getPos(e);

    ctx.strokeStyle = document.getElementById("colorPicker").value;
    ctx.lineWidth = document.getElementById("size").value;
    ctx.lineCap = "round";

    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
}

// Stop
function stop(){
    drawing = false;
}

// Events (both mobile + desktop)
canvas.addEventListener("mousedown", start);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", stop);

canvas.addEventListener("touchstart", start);
canvas.addEventListener("touchmove", draw);
canvas.addEventListener("touchend", stop);

// Clear
function clearCanvas(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
}
</script>

</body>
</html>
