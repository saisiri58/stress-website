<!DOCTYPE html>
<html>
<head>
    <title>Student Stress Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            scroll-behavior: smooth;
        }

        nav {
            background: #1e272e;
            padding: 15px;
            position: sticky;
            top: 0;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #00cec9;
        }

        header {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 32px;
            animation: fadeIn 2s;
        }

        .card {
            background: white;
            margin: 20px auto;
            padding: 25px;
            border-radius: 15px;
            width: 85%;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            animation: slideUp 1s;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
        }

        h2 {
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #00b894;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #019875;
        }

        input, textarea {
            width: 80%;
            padding: 10px;
            margin: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        canvas {
            border: 2px solid #333;
            margin-top: 10px;
        }

        footer {
            background: #1e272e;
            color: white;
            text-align: center;
            padding: 10px;
        }

        /* Animations */
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideUp {
            from {transform: translateY(40px); opacity: 0;}
            to {transform: translateY(0); opacity: 1;}
        }
    </style>
</head>

<body>

<nav>
    <a href="#">Home</a>
    <a href="#tips">Tips</a>
    <a href="#relax">Relax</a>
    <a href="#draw">Draw</a>
    <a href="#game">Game</a>
    <a href="#contact">Contact</a>
</nav>

<header>
    🌿 Student Stress Management
</header>

<div class="card" id="tips">
    <h2>📘 Stress Relief Tips</h2>
    <p>✔ Take breaks regularly</p>
    <p>✔ Stay organized with a schedule</p>
    <p>✔ Exercise and stay active</p>
</div>

<div class="card" id="relax">
    <h2>🧘 Relax Zone</h2>
    <button onclick="playMusic()">Play Music 🎵</button>
    <button onclick="stopMusic()">Stop ⏹</button>
    <audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
</div>

<div class="card" id="draw">
    <h2>🎨 Drawing Board</h2>
    <canvas id="canvas" width="300" height="300"></canvas><br>
    <button onclick="clearCanvas()">Clear</button>
</div>

<div class="card" id="game">
    <h2>🎮 Click Game</h2>
    <p>Score: <span id="score">0</span></p>
    <button onclick="increaseScore()">Click Me Fast!</button>
</div>

<div class="card" id="contact">
    <h2>📩 Contact</h2>
    <input type="text" placeholder="Your Name"><br>
    <input type="email" placeholder="Your Email"><br>
    <textarea placeholder="Your Message"></textarea><br>
    <button onclick="sendMessage()">Send</button>
    <p id="msg"></p>
</div>

<footer>
    Made with ❤️ by Srilatha
</footer>

<script>
// 🎵 Music
function playMusic() {
    document.getElementById("music").play();
}
function stopMusic() {
    document.getElementById("music").pause();
}

// 🎨 Drawing (works on mobile too)
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let drawing = false;

canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", () => drawing = true);
canvas.addEventListener("touchend", () => drawing = false);
canvas.addEventListener("touchmove", function(e){
    let rect = canvas.getBoundingClientRect();
    let x = e.touches[0].clientX - rect.left;
    let y = e.touches[0].clientY - rect.top;
    ctx.fillRect(x, y, 2, 2);
});

function draw(e){
    if(!drawing) return;
    ctx.fillRect(e.offsetX, e.offsetY, 2, 2);
}

function clearCanvas(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
}

// 🎮 Game
let score = 0;
function increaseScore(){
    score++;
    document.getElementById("score").innerText = score;
}

// 📩 Fake Contact Response
function sendMessage(){
    document.getElementById("msg").innerText = "Message sent successfully!";
}
</script>

</body>
</html>
